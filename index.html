<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Universe 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="starfield"></canvas>

    <div id="login-page">
        <div class="login-box">
            <h1>Enter Our Universe 🌌</h1>
            <input type="password" id="password" placeholder="The secret password..." />
            <button onclick="checkPassword()">Enter Our World</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <header>
            <h1 id="typewriter"></h1>
        </header>

        <main>
            <div class="section">
                <h2>Our Moments 💖</h2>
                <div class="row">
                    <img src="assets/images/photo1.jpg" alt="Memory 1" onclick="openModal(this.src)">
                    <img src="assets/images/photo2.jpg" alt="Memory 2" onclick="openModal(this.src)">
                    <img src="assets/images/photo3.jpg" alt="Memory 3" onclick="openModal(this.src)">
                    <img src="assets/images/photo4.jpg" alt="Memory 4" onclick="openModal(this.src)">
                    <img src="assets/images/photo5.jpg" alt="Memory 5" onclick="openModal(this.src)">
                </div>
            </div>

            <div class="section">
                <h2>Our Special Video 🎥</h2>
                <div class="video-container">
                    <video id="video" loop muted playsinline>
                        <source src="assets/video/video.mp4" type="video/mp4">
                    </video>
                    <div class="video-controls">
                        <button onclick="toggleSound()">Toggle Sound 🔊</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="hidden" onclick="closeModal()">
        <span class="close-btn">&times;</span>
        <img id="modal-img">
    </div>

    <audio id="bg-music" loop>
        <source src="assets/music/music.mp3" type="audio/mp3">
    </audio>

    <script src="script.js"></script>
</body>
</html>
