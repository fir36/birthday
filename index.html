<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Universe 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="starfield"></canvas>

    <div id="login-page" class="view">
        <div class="login-box">
            <h1>Enter Our Universe 🌌</h1>
            <input type="password" id="password" placeholder="The secret password..." />
            <button onclick="checkPassword()">Enter Our World</button>
            <p id="error-msg"></p>
        </div>
    </div>

    <div id="main-page" class="view hidden">
        <header>
            <h1 id="typewriter"></h1>
        </header>
        <div class="journey-map">
            <div class="planet-link" onclick="showSection('moments')">
                <div class="planet purp"></div>
                <p>Our Moments</p>
            </div>
            <div class="planet-link" onclick="showSection('video')">
                <div class="planet blue"></div>
                <p>A Special Message</p>
            </div>
            <div class="planet-link" onclick="showSection('letter')">
                <div class="planet pink"></div>
                <p>My Letter</p>
            </div>
        </div>
    </div>

    <div id="moments" class="view hidden">
        <button class="back-btn" onclick="showSection('main-page')">← Back to Space</button>
        <h2 class="section-title">Our Galaxy of Memories</h2>
        <div class="row">
            <img src="assets/images/1.jpg" onclick="openModal(this.src)">
            <img src="assets/images/2.jpg" onclick="openModal(this.src)">
            <img src="assets/images/3.jpg" onclick="openModal(this.src)">
            <img src="assets/images/4.jpg" onclick="openModal(this.src)">
        </div>
    </div>

    <div id="video" class="view hidden">
        <button class="back-btn" onclick="showSection('main-page')">← Back to Space</button>
        <div class="video-container">
            <video id="main-video" loop muted playsinline>
                <source src="assets/video/video.mp4" type="video/mp4">
            </video>
            <button class="sound-toggle" onclick="toggleSound()">Unmute Music 🔊</button>
        </div>
    </div>

    <div id="letter" class="view hidden">
        <button class="back-btn" onclick="showSection('main-page')">← Back to Space</button>
        <div class="letter-box">
            <h2>To My Universe...</h2>
            <p>Write your beautiful birthday message here. Explain how much she means to you and how she lights up your world like the stars above. 💖</p>
            <p>Happy Birthday, My Love!</p>
        </div>
    </div>

    <div id="modal" class="hidden" onclick="closeModal()">
        <img id="modal-img">
    </div>

    <audio id="bg-music" loop>
        <source src="assets/music/music.mp3" type="audio/mp3">
    </audio>

    <script src="script.js"></script>
</body>
</html>
