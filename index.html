<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Universe 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <h1>Enter Our Universe 🌌</h1>
    <input type="password" id="password" placeholder="Enter password..." />
    <button onclick="checkPassword()">Enter</button>
    <p id="error-msg"></p>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="main-page" class="hidden">
  <h1 id="typewriter"></h1>

  <div class="section">
    <h2>Our Moments 💖</h2>
    <div class="row">
      <img src="assets/images/photo1.jpg" onclick="openModal(this.src)">
      <img src="assets/images/photo2.jpg" onclick="openModal(this.src)">
      <img src="assets/images/photo3.jpg" onclick="openModal(this.src)">
    </div>
  </div>

  <div class="section">
    <h2>Our Special Video 🎥</h2>
    <video id="video" autoplay loop muted>
      <source src="assets/video/video.mp4" type="video/mp4">
    </video>
    <button onclick="toggleSound()">Toggle Sound 🔊</button>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="modal" class="hidden" onclick="closeModal()">
  <img id="modal-img">
</div>

<audio id="bg-music" loop>
  <source src="assets/music/music.mp3" type="audio/mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
